<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile Motion Tracker</title>

<style>
  body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
  }

  button {
    padding: 10px 20px;
    margin: 10px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
  }

  textarea {
    width: 90%;
    height: 150px;
    background: black;
    color: #0f0;
    padding: 10px;
  }
</style>
</head>

<body>

<h2>📱 Mobile Path Capture</h2>

<button onclick="startTracking()">Start</button>
<button onclick="stopTracking()">Stop</button>

<br>

<textarea id="output" placeholder="Path will appear here..."></textarea>

<script>
let lastSaved = {x: 0, z: 0};
let lastSaveTime = 0;
let lastStepTime = 0;

function handleMotion(event) {
  if (!tracking) return;

  let acc = event.acceleration; // ✅ remove gravity
  if (!acc) return;

  let now = Date.now();
  if (!lastTime) {
    lastTime = now;
    return;
  }

  let dt = (now - lastTime) / 1000;
  lastTime = now;

  // ===== TOTAL ACCELERATION MAGNITUDE =====
  let ax = acc.x || 0;
  let ay = acc.y || 0;
  let az = acc.z || 0;

  let magnitude = Math.sqrt(ax*ax + ay*ay + az*az);

  // ===== IGNORE SMALL NOISE =====
  if (magnitude < 0.3) return;   // 🔥 phone is almost still

  // ===== STEP DETECTION (PEAK) =====
  const STEP_THRESHOLD = 1.2;     // adjust if needed
  const STEP_GAP = 300;           // ms between steps

  let isStep = magnitude > STEP_THRESHOLD && (now - lastStepTime > STEP_GAP);

  // ===== NORMAL INTEGRATION =====
  const damping = 0.9;

  velocity.x = (velocity.x + ax * dt) * damping;
  velocity.z = (velocity.z + az * dt) * damping;

  position.x += velocity.x * dt;
  position.z += velocity.z * dt;

  // ===== SAVE ONLY ON STEP =====
  if (isStep) {
    lastStepTime = now;

    // Save only limited samples per step
    const MAX_POINTS_PER_STEP = 6;

    let dx = position.x - lastSaved.x;
    let dz = position.z - lastSaved.z;
    let dist = Math.sqrt(dx*dx + dz*dz);

    if (dist > 0.05) {
      path.push([position.x, 0, position.z]);

      lastSaved = {x: position.x, z: position.z};

      // Limit total density
      if (path.length > 1000) path.shift();

      document.getElementById("output").value = JSON.stringify(path);
    }
  }
}
</script>

</body>
</html>
