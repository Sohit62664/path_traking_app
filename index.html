<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile Motion Tracker</title>

<style>
  body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
  }

  button {
    padding: 10px 20px;
    margin: 10px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
  }

  textarea {
    width: 90%;
    height: 150px;
    background: black;
    color: #0f0;
    padding: 10px;
  }
</style>
</head>

<body>

<h2>📱 Mobile Path Capture</h2>

<button onclick="startTracking()">Start</button>
<button onclick="stopTracking()">Stop</button>

<br>

<textarea id="output" placeholder="Path will appear here..."></textarea>

<script>
let tracking = false;
let path = [];
let velocity = {x: 0, z: 0};
let position = {x: 0, z: 0};
let lastTime = null;

let lastSaved = {x: 0, z: 0};
let lastStepTime = 0;

// ===== START =====
async function startTracking() {
  path = [];
  velocity = {x: 0, z: 0};
  position = {x: 0, z: 0};
  lastTime = null;

  if (typeof DeviceMotionEvent.requestPermission === 'function') {
    let permission = await DeviceMotionEvent.requestPermission();
    if (permission !== 'granted') {
      alert("Permission denied");
      return;
    }
  }

  tracking = true;
  window.addEventListener("devicemotion", handleMotion);
}

// ===== STOP =====
function stopTracking() {
  tracking = false;
  window.removeEventListener("devicemotion", handleMotion);

  document.getElementById("output").value = JSON.stringify(path);
}

// ===== MOTION =====
function handleMotion(event) {
  if (!tracking) return;

  let acc = event.acceleration;
  if (!acc) return;

  let now = Date.now();
  if (!lastTime) {
    lastTime = now;
    return;
  }

  let dt = (now - lastTime) / 1000;
  lastTime = now;

  // acceleration
  let ax = acc.x || 0;
  let ay = acc.y || 0;
  let az = acc.z || 0;

  let magnitude = Math.sqrt(ax*ax + ay*ay + az*az);

  // 🔥 relaxed threshold (IMPORTANT)
  if (magnitude < 0.15) return;

  // step detection (relaxed)
  const STEP_THRESHOLD = 0.8;
  const STEP_GAP = 250;

  let isStep = magnitude > STEP_THRESHOLD && (now - lastStepTime > STEP_GAP);

  // motion integration
  const damping = 0.9;

  velocity.x = (velocity.x + ax * dt) * damping;
  velocity.z = (velocity.z + az * dt) * damping;

  position.x += velocity.x * dt;
  position.z += velocity.z * dt;

  // save point
  if (isStep) {
    lastStepTime = now;

    let dx = position.x - lastSaved.x;
    let dz = position.z - lastSaved.z;
    let dist = Math.sqrt(dx*dx + dz*dz);

    if (dist > 0.02) {  // smaller threshold
      path.push([position.x, 0, position.z]);

      lastSaved = {x: position.x, z: position.z};

      document.getElementById("output").value = JSON.stringify(path);
    }
  }
}
</script>

</body>
</html>
