<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile Path Tracker</title>

<style>
  body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
  }

  textarea {
    width: 90%;
    height: 120px;
    margin: 10px;
    background: #000;
    color: #0f0;
    border: 1px solid #00ffcc;
    padding: 10px;
  }

  button {
    padding: 10px 20px;
    margin: 5px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
  }

  canvas {
    background: black;
    border: 2px solid #00ffcc;
  }
</style>
</head>

<body>

<h2>📍 Mobile Path Tracker</h2>

<textarea id="input">
[[0,0,0],[1,0,1],[2,0,2]]
</textarea>

<br>
<button onclick="startDrawing()">Start Tracking</button>
<button onclick="reset()">Reset</button>

<br><br>

<canvas id="canvas" width="600" height="600"></canvas>

<script>
let lastSaved = {x: 0, z: 0};
let lastSaveTime = 0;

function handleMotion(event) {
  if (!tracking) return;

  let acc = event.acceleration; // remove gravity

  if (!acc) return;

  let now = Date.now();
  if (!lastTime) {
    lastTime = now;
    return;
  }

  let dt = (now - lastTime) / 1000;
  lastTime = now;

  // ===== FILTER =====
  function filter(a) {
    return Math.abs(a) < 0.2 ? 0 : a;
  }

  let ax = filter(acc.x || 0);
  let az = filter(acc.z || 0);

  // ===== DAMPING =====
  const damping = 0.9;

  velocity.x = (velocity.x + ax * dt) * damping;
  velocity.z = (velocity.z + az * dt) * damping;

  position.x += velocity.x * dt;
  position.z += velocity.z * dt;

  // ===== SAVE CONTROL =====

  const MIN_DISTANCE = 0.05;   // 🔥 adjust this (bigger = fewer points)
  const MIN_TIME = 200;        // ms (5 points/sec approx)

  let dx = position.x - lastSaved.x;
  let dz = position.z - lastSaved.z;
  let dist = Math.sqrt(dx*dx + dz*dz);

  if (dist > MIN_DISTANCE && (now - lastSaveTime) > MIN_TIME) {

    path.push([position.x, 0, position.z]);

    lastSaved = {x: position.x, z: position.z};
    lastSaveTime = now;

    document.getElementById("output").value = JSON.stringify(path);
  }
}
</script>

</body>
</html>
