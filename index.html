<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile Motion Tracker</title>

<style>
  body {
    background: #111;
    color: white;
    text-align: center;
    font-family: Arial;
  }

  button {
    padding: 10px 20px;
    margin: 10px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
  }

  textarea {
    width: 90%;
    height: 150px;
    background: black;
    color: #0f0;
    padding: 10px;
  }
</style>
</head>

<body>

<h2>📱 Mobile Path Capture</h2>

<button onclick="startTracking()">Start</button>
<button onclick="stopTracking()">Stop</button>

<br>

<textarea id="output" placeholder="Path will appear here..."></textarea>

<script>
function handleMotion(event) {
  if (!tracking) return;

  // ✅ Use INCLUDING GRAVITY (works on all phones)
  let acc = event.accelerationIncludingGravity;
  if (!acc) return;

  let now = Date.now();
  if (!lastTime) {
    lastTime = now;
    return;
  }

  let dt = (now - lastTime) / 1000;
  lastTime = now;

  let ax = acc.x || 0;
  let az = acc.z || 0;

  // ✅ Simple noise filter
  if (Math.abs(ax) < 0.1) ax = 0;
  if (Math.abs(az) < 0.1) az = 0;

  // ✅ Damping
  const damping = 0.9;

  velocity.x = (velocity.x + ax * dt) * damping;
  velocity.z = (velocity.z + az * dt) * damping;

  position.x += velocity.x * dt;
  position.z += velocity.z * dt;

  // ✅ Save ONLY every 200ms (important)
  if (!window.lastSaveTime) window.lastSaveTime = 0;

  if (now - window.lastSaveTime > 200) {
    path.push([position.x, 0, position.z]);
    window.lastSaveTime = now;

    document.getElementById("output").value = JSON.stringify(path);
  }
}
</script>

</body>
</html>
